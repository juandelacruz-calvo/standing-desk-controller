[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

monitor_speed = 115200

; Set to your COM port if auto-detect fails
upload_port = COM5
monitor_port = COM5

lib_deps =
    enjoyneering/HCSR04@^1.3.0
    bxparks/AceButton@^1.10.1
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200
; Set to your COM port if auto-detect fails
upload_port = COM5
monitor_port = COM5
build_flags = -D NO_WIFI
lib_deps =
    enjoyneering/HCSR04@^1.3.0
    bxparks/AceButton@^1.10.1
